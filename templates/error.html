<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error {{ code }} | FinoraXpense</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary: #f58220; 
            --bg: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
        }

        .dark-mode {
            --bg: #020617;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }

        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background 0.5s ease;
        }

        .error-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .error-content {
            text-align: center;
            max-width: 500px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, #ff9538 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .btn-primary {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 12px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 1.5rem;
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(245, 130, 32, 0.3);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-content">
            <img src="FinoraXpense_Logo.png" alt="FinoraXpense" class="h-16 mx-auto mb-8">
            
            <div class="error-code">{{ code }}</div>
            
            <h1 class="text-3xl font-bold mb-4">{{ message }}</h1>
            
            <p class="text-[var(--text-sub)] text-lg mb-8">
                {% if code == 404 %}
                The page you're looking for doesn't exist.
                {% elif code == 500 %}
                Something went wrong on our end. Please try again later.
                {% else %}
                An error occurred. Please try again.
                {% endif %}
            </p>
            
            <a href="{{ url_for('home') }}" class="btn-primary">
                <i class="fas fa-arrow-left mr-2"></i> Back to Home
            </a>
        </div>
    </div>
</body>
</html>
